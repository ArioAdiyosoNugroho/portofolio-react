<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArioAdi — Craft Brands &amp; Digital Experiences</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#1a7a8a',
              dark:    '#0f5c6b',
              darker:  '#0c4a5a',
              light:   '#e0f2f5',
            },
            brand: {
              dark:   '#111318',
              mid:    '#1e2228',
              grey:   '#6b7280',
              border: '#e5e7eb',
              light:  '#f9fafb',
            },
            accent: '#fdb213',
          },
          fontFamily: {
            // Font Display untuk Heading besar (Hero section)
            display: ['"Plus Jakarta Sans"', 'sans-serif'],
            // Font Body untuk deskripsi dan konten artikel
            body:    ['"Inter"', 'sans-serif'], 
            // Font khusus UI/Navigasi jika tetap ingin menggunakan Outfit
            ui:      ['"Outfit"', 'sans-serif'],
          },
          boxShadow: {
            float:   '0 8px 32px rgba(0,0,0,0.12)',
            card:    '4px 8px 24px rgba(0,0,0,0.06)',
            primary: '0 8px 24px rgba(26,122,138,0.28)',
          },
          borderRadius: {
            card: '20px',
            xl2:  '24px',
          },
        },
      },
    };
  </script>
</head>
<body class="font-body text-brand-dark bg-brand-light">
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
